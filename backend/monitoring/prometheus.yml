# ============================================================
# prometheus.yml — Prometheus scrape configuration
#
# Prometheus pull metrics từ:
#   crm-api     → http://host.docker.internal:3000/metrics (every 15s)
#   prometheus  → self-scrape (every 1m)
# ============================================================

global:
  scrape_interval: 15s          # Default scrape interval
  evaluation_interval: 15s      # Rule evaluation interval
  scrape_timeout: 10s

  # Labels gắn vào mọi time series (dùng để filter trong Grafana)
  external_labels:
    environment: 'development'
    project: 'crm-multi-tenant'

scrape_configs:
  # ── CRM API ───────────────────────────────────────────────
  - job_name: 'crm-api'
    scrape_interval: 15s
    metrics_path: '/metrics'
    static_configs:
      - targets:
          - 'host.docker.internal:3000'  # App chạy trên host machine
        labels:
          service: 'crm-api'
          layer: 'L3-L2'

  # ── Prometheus self-monitoring ────────────────────────────
  - job_name: 'prometheus'
    scrape_interval: 60s
    static_configs:
      - targets: ['localhost:9090']

  # ── Jaeger (future: metrics endpoint) ────────────────────
  # Jaeger all-in-one expose /metrics (Prometheus format) trên port 14269
  - job_name: 'jaeger'
    scrape_interval: 30s
    static_configs:
      - targets: ['jaeger:14269']
        labels:
          service: 'jaeger'
